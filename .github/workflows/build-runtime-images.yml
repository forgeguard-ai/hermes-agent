name: Build Runtime Images (GHCR)

# Fork-owned image publisher. Upstream (NousResearch/hermes-agent) publishes
# its multi-arch image to Docker Hub through docker.yml with an upstream-only
# repo guard; that workflow never runs on a fork. This workflow builds the
# SAME Dockerfile's two published targets and pushes them to this fork's
# GitHub Container Registry (ghcr.io/<owner>/hermes-agent) for self-hosted /
# remote deployments:
#
#   runtime  → runtime-<sha> / runtime-latest / runtime-<version>
#              s6-supervised server image (dashboard + gateways + web UI),
#              validated by the full tests/docker/ integration suite.
#   cli      → cli-<sha> / cli-latest / cli-<version>
#              lean interactive image for distrobox / CLI use, validated by
#              a smoke test (launcher shim, profile.d env, distrobox deps,
#              no supervisor).
#
# Triggers: release-on-merge.yml (workflow_call) is the ONE merge-time
# builder — this file deliberately has NO push trigger so a merge can't build
# the same images twice. workflow_dispatch remains as the manual escape hatch
# (e.g. building a branch's images with push=false to validate).
#
# Scope: linux/amd64 only for now. arm64 + a per-arch digest/manifest-merge
# structure can be layered on later, mirroring docker.yml.

on:
  workflow_call:
    inputs:
      push:
        description: "Push the built images to GHCR (otherwise build + test only)"
        type: boolean
        default: true
      version:
        description: "Optional release version stamped as an extra per-variant tag (e.g. v2026.7.1-forgeguard.4 → runtime-v2026.7.1-forgeguard.4 / cli-v2026.7.1-forgeguard.4)"
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      push:
        description: "Push the built images to GHCR (otherwise build + test only)"
        type: boolean
        default: true

permissions:
  contents: read
  # Required so build-push-action can push the image + read/write the
  # registry-backed build cache on ghcr.io.
  packages: write

# Never cancel a release-driven publish; collapse rapid manual re-dispatches.
concurrency:
  group: runtime-images-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  build-amd64:
    strategy:
      fail-fast: false
      matrix:
        target: [runtime, cli]
    name: Build ${{ matrix.target }} image (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Lowercase the owner: GHCR image paths must be lowercase, but
      # github.repository_owner preserves the account's original casing.
      - name: Compute image name
        id: image
        run: |
          owner="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/hermes-agent" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Log in up-front so the registry-backed build cache can be read on every
      # run and written on publishing runs. Uses the workflow GITHUB_TOKEN,
      # which is valid for the whole job (see docker.yml's arm64 rationale for
      # why the registry cache credential outlives the gha SAS token).
      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build once, load into the local daemon so the validation below runs
      # against the exact bytes we publish. Same build-args + cache discipline
      # as docker.yml, with a per-target cache ref (the two targets share the
      # base/toolchain layers through the registry cache anyway).
      - name: Build image (${{ matrix.target }}, amd64)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          load: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.name }}:test-${{ matrix.target }}
          # Bake the revision label here so the tested image already carries it
          # and the publish step can retag-and-push these exact bytes.
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:buildcache-${{ matrix.target }}-amd64
          cache-to: type=registry,ref=${{ steps.image.outputs.name }}:buildcache-${{ matrix.target }}-amd64,mode=max

      - name: Install uv (for docker tests)
        if: matrix.target == 'runtime'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0

      - name: Set up Python 3.11 (for docker tests)
        if: matrix.target == 'runtime'
        run: uv python install 3.11

      - name: Install Python dependencies (for docker tests)
        if: matrix.target == 'runtime'
        run: |
          uv sync --locked --python 3.11 --extra dev

      # Reuse the daemon-loaded image so the tests validate the published
      # bytes. HERMES_TEST_IMAGE short-circuits the fixture rebuild.
      - name: Run docker integration tests (runtime)
        if: matrix.target == 'runtime'
        env:
          HERMES_TEST_IMAGE: ${{ steps.image.outputs.name }}:test-runtime
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
        run: |
          scripts/run_tests.sh tests/docker/ --file-timeout 600

      # The cli image has no supervisor/dashboard to integration-test; assert
      # its published contract instead: the launcher shim resolves for any
      # uid, login shells get the profile.d environment, the distrobox
      # host-integration packages are pre-baked, and no s6/dashboard stack
      # leaked in.
      - name: Smoke-test cli image
        if: matrix.target == 'cli'
        env:
          IMG: ${{ steps.image.outputs.name }}:test-cli
        run: |
          set -euo pipefail
          docker run --rm "$IMG" hermes --version
          docker run --rm --user 12345:12345 -e HOME=/tmp "$IMG" hermes --version
          docker run --rm "$IMG" sh -lc '
            set -eu
            command -v hermes >/dev/null
            [ -f /etc/profile.d/hermes.sh ]
            [ -n "${PLAYWRIGHT_BROWSERS_PATH:-}" ]
            dpkg -s sudo bc pinentry-curses libnss-myhostname locales >/dev/null
            [ ! -e /init ]
            [ ! -d /etc/s6-overlay ]
            [ ! -e /opt/hermes/hermes_cli/web_dist ] || { echo "web_dist leaked into cli image" >&2; exit 1; }
            echo "cli-smoke-ok"
          '

      # Publish on an explicit workflow_dispatch with push=true, or a
      # workflow_call (release-on-merge.yml) with push=true.
      # Base tags: <variant>-<sha> (immutable, traceable) + <variant>-latest
      # (rolling). A release-on-merge call also passes version, adding e.g.
      # runtime-v2026.7.1-forgeguard.4, so the exact fork release is pullable
      # without relying on the rolling tag drifting forward.
      #
      # NOTE: github.event_name inside a called (workflow_call) workflow is
      # always the CALLER's triggering event (e.g. `pull_request` for
      # release-on-merge.yml) — it is never literally "workflow_call". Gate
      # on the `inputs.push` value itself (default true for both
      # workflow_call and workflow_dispatch) rather than trying to detect the
      # call type via event name, or this step silently no-ops for every
      # caller. (Found 2026-07-02: this bug meant no image had ever actually
      # been pushed by release-on-merge.yml.)
      - name: Compute image tags
        id: tags
        run: |
          {
            echo "list<<TAGEOF"
            echo "${{ steps.image.outputs.name }}:${{ matrix.target }}-${{ github.sha }}"
            echo "${{ steps.image.outputs.name }}:${{ matrix.target }}-latest"
            if [ -n "${{ inputs.version }}" ]; then
              echo "${{ steps.image.outputs.name }}:${{ matrix.target }}-${{ inputs.version }}"
            fi
            echo "TAGEOF"
          } >> "$GITHUB_OUTPUT"

      # Publish the EXACT bytes that were built and tested above — the local
      # `test-<target>` image — by retagging and pushing it, NOT by running a
      # second build. A second build-push-action invocation rebuilds from cache
      # and could publish an image the integration/smoke tests never ran
      # against; docker tag + push guarantees tested == published.
      - name: Push image to GHCR
        if: inputs.push
        env:
          SRC: ${{ steps.image.outputs.name }}:test-${{ matrix.target }}
          TAGS: ${{ steps.tags.outputs.list }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag "$SRC" "$tag"
            docker push "$tag"
          done <<< "$TAGS"
